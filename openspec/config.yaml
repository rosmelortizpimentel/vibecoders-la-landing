rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
    - Public site only — no auth, no DB writes
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Follow D:\Projects\vibecoders\renault\DESIGN.md as sole design source of truth
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
  apply:
    - Follow Astro 5 hybrid mode conventions
    - Never hardcode colors — use Tailwind tokens from tailwind.config.mjs
    - Zero border-radius on buttons (Renault system rule)
    - Chessboard section alternation (light/dark)
    - All auth/platform CTAs: redirect to app.vibecoders.la?ref=<source>
    - TypeScript strict — zero `any`
    - pnpm as package manager (never npm or yarn)
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
